# ── Local Development Profile ─────────────────────────────────────────────────
# Everything here points to your local machine (Docker containers + local Postgres)

spring:
  # PostgreSQL — your local database
  datasource:
    url: jdbc:postgresql://localhost:5432/ordersdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # Creates tables if missing, updates schema — safe for dev
    show-sql: true            # Print every SQL query in the logs (great for learning!)
    properties:
      hibernate:
        format_sql: true      # Pretty-print the SQL
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true  # Run data.sql AFTER Hibernate creates tables

  sql:
    init:
      mode: always            # Run data.sql every startup (uses ON CONFLICT DO NOTHING)

  # Redis — Docker container on port 6379
  data:
    redis:
      host: localhost
      port: 6379

  # Kafka — Docker container on port 9092
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false   # Send clean JSON, no Java class info embedded

# ── Custom app settings ───────────────────────────────────────────────────────
app:
  kafka:
    topic:
      orders: orders          # The Kafka topic name our producer publishes to
  cache:
    product-ttl-minutes: 5    # How long a product stays in Redis before expiring
