# ── order-consumer Local Profile ─────────────────────────────────────────────

spring:
  # Same PostgreSQL database as order-api — they share the same tables
  datasource:
    url: jdbc:postgresql://localhost:5432/ordersdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Same Redis instance as order-api — they share the same leaderboard key
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-processors    # ← This group's offsets are tracked SEPARATELY from 'notifiers'
      auto-offset-reset: earliest   # If no prior offset, start from beginning of topic
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.orders.order_comsumer.dto.OrderEvent

app:
  kafka:
    topic:
      orders: orders
